<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArrowChatv2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root {
      --bg: #000;
      --s1: #0a0a0a;
      --s2: #111;
      --s3: #171717;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --text: #e8e8e8;
      --muted: #777;
      --dim: #444;
      --field: #141414;
      --hover: #141414;
      --active: #1c1c1c;
      color-scheme: dark;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; }

    .layout {
      display: grid;
      grid-template-columns: 220px 1fr 200px;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--s1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 0.92rem;
      letter-spacing: 0.03em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .sidebar-search {
      padding: 0.55rem 0.65rem;
      border-bottom: 1px solid var(--border);
      position: relative;
      flex-shrink: 0;
    }
    .sidebar-search i {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--dim);
      font-size: 0.72rem;
      pointer-events: none;
    }
    .sidebar-search input {
      width: 100%;
      background: var(--field);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 4px;
      padding: 0.28rem 0.5rem 0.28rem 1.65rem;
      font-size: 0.8rem;
      outline: none;
    }
    .sidebar-search input::placeholder { color: var(--dim); }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 0.4rem 0; }
    .sidebar-nav::-webkit-scrollbar { width: 3px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .nav-section { padding: 0.5rem 0.6rem 0.1rem; }
    .nav-section-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--dim);
      margin-bottom: 0.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-section-title button {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 0.85rem;
      line-height: 1;
      padding: 0;
    }
    .nav-section-title button:hover { color: var(--text); }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0.45rem;
      border-radius: 4px;
      color: var(--muted);
      font-size: 0.86rem;
      text-decoration: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-item:hover { background: var(--hover); color: var(--text); }
    .nav-item.active { background: var(--active); color: var(--text); }
    .nav-item i { width: 14px; text-align: center; font-size: 0.78rem; flex-shrink: 0; }
    .sidebar-footer {
      padding: 0.6rem 0.7rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .user-card { display: flex; align-items: center; gap: 0.5rem; }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--s3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-status { font-size: 0.68rem; color: var(--muted); }
    .footer-actions { display: flex; gap: 0.2rem; }
    .icon-btn {
      background: none;
      border: none;
      color: var(--muted);
      padding: 0.25rem;
      border-radius: 4px;
      font-size: 0.8rem;
      line-height: 1;
    }
    .icon-btn:hover { background: var(--active); color: var(--text); }

    /* ── Chat ── */
    .chat {
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--bg);
      overflow: hidden;
    }
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-title {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .chat-title i { color: var(--muted); font-size: 0.85rem; }
    .header-actions { display: flex; gap: 0.3rem; }
    .header-btn {
      background: var(--s2);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 4px;
      padding: 0.28rem 0.6rem;
      font-size: 0.76rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .header-btn:hover { background: var(--active); }
    .messages {
      overflow-y: auto;
      padding: 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .messages-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--dim);
      gap: 0.5rem;
      font-size: 0.82rem;
    }
    .messages-empty i { font-size: 2.2rem; color: var(--border2); }
    .msg {
      display: flex;
      gap: 0.65rem;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
    }
    .msg:hover { background: var(--hover); }
    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--s3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg-body { flex: 1; min-width: 0; }
    .msg-meta { display: flex; align-items: baseline; gap: 0.45rem; margin-bottom: 0.12rem; }
    .msg-author { font-weight: 600; font-size: 0.86rem; }
    .msg-time { font-size: 0.68rem; color: var(--dim); }
    .msg-text { font-size: 0.86rem; line-height: 1.5; color: var(--text); word-break: break-word; }
    .msg-cont { padding: 0.15rem 0.4rem 0.15rem calc(34px + 1.05rem); border-radius: 4px; }
    .msg-cont:hover { background: var(--hover); }
    .msg-cont .msg-text { font-size: 0.86rem; line-height: 1.5; word-break: break-word; }

    /* ── Composer ── */
    .composer { padding: 0 0.85rem 0.85rem; flex-shrink: 0; }
    .composer-bar {
      background: var(--s2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.65rem;
    }
    .composer-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.88rem;
      outline: none;
    }
    .composer-bar input::placeholder { color: var(--dim); }
    .composer-action {
      background: none;
      border: none;
      color: var(--muted);
      padding: 0.22rem 0.3rem;
      border-radius: 4px;
      font-size: 0.82rem;
      line-height: 1;
    }
    .composer-action:hover { background: var(--active); color: var(--text); }
    .send-btn {
      background: var(--s3);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 4px;
      padding: 0.28rem 0.65rem;
      font-size: 0.78rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .send-btn:hover { background: var(--active); }

    /* ── Members ── */
    .members-panel {
      background: var(--s1);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .members-header {
      padding: 0.7rem 0.8rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .members-list { flex: 1; overflow-y: auto; padding: 0.4rem 0.4rem; }
    .members-list::-webkit-scrollbar { width: 3px; }
    .members-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .member-item {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.25rem 0.35rem;
      border-radius: 4px;
    }
    .member-item:hover { background: var(--hover); cursor: pointer; }
    .member-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--s3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      color: var(--muted);
      flex-shrink: 0;
      position: relative;
    }
    .status-dot {
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 2px solid var(--s1);
    }
    .online .status-dot { background: #3c3; }
    .away .status-dot { background: #a80; }
    .offline .status-dot { background: var(--border2); }
    .member-name { font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .member-item.online .member-name { color: var(--text); }
    .member-item.offline .member-name, .member-item.away .member-name { color: var(--muted); }
    .members-section-label {
      font-size: 0.63rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--dim);
      padding: 0.45rem 0.35rem 0.15rem;
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <i class="fa-solid fa-arrow-right"></i>
        ArrowChat
      </div>
      <div class="sidebar-search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search..." aria-label="Search" />
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Navigate</div>
          <a class="nav-item" href="friends/index.html">
            <i class="fa-solid fa-user-group"></i> Friends
          </a>
          <a class="nav-item" href="groupchat/privaterooms/private.html">
            <i class="fa-solid fa-lock"></i> Private Rooms
          </a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Public Rooms</div>
          <a class="nav-item active" href="public/public-rooms/worldchat.html">
            <i class="fa-solid fa-hashtag"></i> World-chat
          </a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">
            Direct Messages
            <button type="button" title="New DM" aria-label="New DM">+</button>
          </div>
          <div id="dm-list"></div>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card">
          <div class="avatar"><i class="fa-solid fa-user"></i></div>
          <div class="user-info">
            <div class="user-name">You</div>
            <div class="user-status">Online</div>
          </div>
          <div class="footer-actions">
            <button class="icon-btn" title="Settings" onclick="location.href='settings/user-settings/index.html'" aria-label="Settings">
              <i class="fa-solid fa-gear"></i>
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Chat -->
    <main class="chat">
      <header class="chat-header">
        <div class="chat-title">
          <i class="fa-solid fa-hashtag"></i>
          World-chat
        </div>
        <div class="header-actions">
          <button class="header-btn" type="button" aria-label="Log out">
            <i class="fa-solid fa-right-from-bracket"></i> Log out
          </button>
        </div>
      </header>
      <div class="messages" id="messages">
        <div class="messages-empty" id="msg-empty">
          <i class="fa-regular fa-comments"></i>
          <span>No messages yet. Say something!</span>
        </div>
      </div>
      <div class="composer">
        <form class="composer-bar" id="composer-form">
          <button class="composer-action" type="button" title="Attach file" aria-label="Attach file">
            <i class="fa-solid fa-paperclip"></i>
          </button>
          <input type="text" id="composer-input" placeholder="Message #World-chat" autocomplete="off" aria-label="Message input" />
          <button class="composer-action" type="button" title="GIF" aria-label="Insert GIF">
            <i class="fa-solid fa-film"></i>
          </button>
          <button class="send-btn" type="submit" aria-label="Send message">
            <i class="fa-solid fa-paper-plane"></i> Send
          </button>
        </form>
      </div>
    </main>

    <!-- Members -->
    <aside class="members-panel">
      <div class="members-header">Members &mdash; <span id="online-count">0</span> online</div>
      <div class="members-list" id="members-list">
        <div class="members-section-label">Online</div>
      </div>
    </aside>
  </div>

  <script>
    // TODO: connect socket.io when backend is ready
    // const socket = io();
    // socket.on('message', (msg) => addMessage(msg.author, msg.text, msg.time));
    // socket.on('members', (list) => updateMembers(list));

    const form = document.getElementById('composer-form');
    const input = document.getElementById('composer-input');
    const msgList = document.getElementById('messages');
    const onlineEl = document.getElementById('online-count');
    let lastAuthor = null;

    function esc(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function ts() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(author, text, time) {
      const empty = document.getElementById('msg-empty');
      if (empty) empty.remove();

      if (author === lastAuthor) {
        const cont = document.createElement('div');
        cont.className = 'msg-cont';
        cont.innerHTML = `<div class="msg-text">${esc(text)}</div>`;
        msgList.appendChild(cont);
      } else {
        const initials = author.slice(0, 2).toUpperCase();
        const msg = document.createElement('div');
        msg.className = 'msg';
        msg.innerHTML = `
          <div class="msg-avatar">${esc(initials)}</div>
          <div class="msg-body">
            <div class="msg-meta">
              <span class="msg-author">${esc(author)}</span>
              <span class="msg-time">${esc(time)}</span>
            </div>
            <div class="msg-text">${esc(text)}</div>
          </div>`;
        msgList.appendChild(msg);
        lastAuthor = author;
      }
      msgList.scrollTop = msgList.scrollHeight;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      addMessage('You', text, ts());
      // TODO: socket.emit('message', { text });
      input.value = '';
    });
  </script>
</body>
</html>
