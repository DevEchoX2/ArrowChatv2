<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArrowChatv2 (heavenly)</title>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8Z+QW9F5YgI5GTbQ2xYt0QYf8Y+N4Vg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0b0d;
      --panel: #070709;
      --panel-border: #2a2a2f;
      --text: #f3f3f4;
      --muted: #9d9da5;
      --field: #1f1f24;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #191814;
      color: var(--text);
      padding: 1rem;
    }

    .app {
      width: min(980px, 100%);
      min-height: 560px;
      background: var(--bg);
      border: 1px solid #6d5e38;
      border-radius: 8px;
      display: grid;
      grid-template-columns: 220px 1fr 200px;
      overflow: hidden;
    }

    .sidebar,
    .chat,
    .members {
      border-right: 1px solid var(--panel-border);
      background: var(--panel);
    }

    .members {
      border-right: none;
    }

    .search {
      padding: 0.75rem;
      border-bottom: 1px solid var(--panel-border);
      position: relative;
    }

    .search i {
      position: absolute;
      top: 50%;
      left: 1.35rem;
      transform: translateY(-50%);
      color: #8f8f99;
      font-size: 0.8rem;
      pointer-events: none;
    }

    .search input {
      width: 100%;
      background: var(--field);
      border: 1px solid #34343c;
      color: var(--text);
      border-radius: 8px;
      padding: 0.35rem 0.6rem 0.35rem 1.75rem;
      outline: none;
    }

    .nav {
      list-style: none;
      padding: 0.8rem 0.55rem;
      display: grid;
      gap: 0.3rem;
    }

    .nav button {
      width: 100%;
      text-align: left;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      color: #dddde2;
      font-weight: 600;
      background: transparent;
      border: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav li.active button {
      background: #1b1c22;
    }

    .section-title {
      margin: 0.4rem 0.65rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--panel-border);
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .settings {
      font-size: 0.8rem;
      color: #d8d8dd;
      background: #1d1e24;
      border: 1px solid #373744;
      border-radius: 6px;
      padding: 0.3rem 0.45rem;
      cursor: pointer;
      margin: auto 0.75rem 0.75rem;
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
    }

    .chat {
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid var(--panel-border);
      font-weight: 700;
    }

    .chat-header .channel {
      font-size: 1.15rem;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
    }

    .actions {
      display: flex;
      gap: 0.4rem;
    }

    .actions button {
      font-size: 0.72rem;
      background: #1d1e24;
      color: #efeff2;
      border: 1px solid #373744;
      border-radius: 6px;
      padding: 0.25rem 0.55rem;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .messages {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.4rem;
      color: #8d8d95;
      font-size: 0.78rem;
      padding: 1rem;
      text-align: center;
      overflow-y: auto;
    }

    .composer {
      padding: 0.8rem;
      border-top: 1px solid var(--panel-border);
    }

    .composer-bar {
      background: var(--field);
      border: 1px solid #33333a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.6rem;
    }

    .composer input {
      flex: 1;
      background: transparent;
      border: 0;
      color: var(--text);
      outline: none;
    }

    .composer button {
      border: 0;
      background: #2a2b31;
      color: #ececf0;
      border-radius: 4px;
      line-height: 1;
      padding: 0.35rem 0.45rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
    }

    .members h2 {
      padding: 0.7rem 0.8rem;
      border-bottom: 1px solid var(--panel-border);
      text-align: center;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <main class="app" aria-label="ArrowChatv2 heavenly chat layout">
    <aside class="sidebar">
      <div class="search">
        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        <input type="text" placeholder="Search..." aria-label="Search" />
      </div>
      <ul class="nav">
        <li class="active">
          <button type="button"><i class="fa-solid fa-user-group" aria-hidden="true"></i>Friends</button>
        </li>
        <li>
          <button type="button"><i class="fa-solid fa-user-slash" aria-hidden="true"></i>Blocked Users</button>
        </li>
        <li>
          <button type="button"><i class="fa-solid fa-scale-balanced" aria-hidden="true"></i>Rules</button>
        </li>
      </ul>
      <p class="section-title">Direct Messages</p>
      <button class="settings" type="button" aria-label="Open settings">
        <i data-lucide="settings" aria-hidden="true"></i>
        Settings
      </button>
    </aside>

    <section class="chat">
      <header class="chat-header">
        <h1 class="channel">
          <i class="fa-solid fa-hashtag" aria-hidden="true"></i>
          World-chat
        </h1>
        <div class="actions">
          <button type="button" aria-label="Navigate to dashboard">
            <i class="fa-solid fa-table-columns" aria-hidden="true"></i>
            Dashboard
          </button>
          <button type="button" aria-label="Log out">
            <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
            Log out
          </button>
        </div>
      </header>
      <div class="messages" id="messages">
        <p>For V1 support please visit our Discord Server.</p>
      </div>
      <form class="composer" id="composer-form">
        <div class="composer-bar">
          <input type="text" id="composer-input" placeholder="Message #World-chat" aria-label="Type a message for the World-chat channel" />
          <button type="button" aria-label="Upload file">
            <i data-lucide="paperclip" aria-hidden="true"></i>
            Upload
          </button>
          <button type="button" aria-label="Insert GIF">
            <i class="fa-solid fa-file-image" aria-hidden="true"></i>
            GIF
          </button>
          <button type="submit" aria-label="Send message">
            <i data-lucide="send" aria-hidden="true"></i>
            Send
          </button>
        </div>
      </form>
    </section>

    <aside class="members">
      <h2>Members</h2>
    </aside>
  </main>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();

    document.getElementById("composer-form").addEventListener("submit", (event) => {
      event.preventDefault();
      const input = document.getElementById("composer-input");
      const message = input.value.trim();
      if (!message) {
        return;
      }
      const messages = document.getElementById("messages");
      const line = document.createElement("p");
      line.textContent = `You: ${message}`;
      messages.appendChild(line);
      input.value = "";
    });
  </script>
</body>
</html>
