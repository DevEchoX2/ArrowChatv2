<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World-chat — ArrowChatv2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="worldchat.css" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <i class="fa-solid fa-arrow-right"></i>
        ArrowChat
      </div>
      <div class="sidebar-search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search..." aria-label="Search" />
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Navigate</div>
          <a class="nav-item" href="../../friends/index.html">
            <i class="fa-solid fa-user-group"></i> Friends
          </a>
          <a class="nav-item" href="../../groupchat/privaterooms/private.html">
            <i class="fa-solid fa-lock"></i> Private Rooms
          </a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Public Rooms</div>
          <a class="nav-item active" href="worldchat.html">
            <i class="fa-solid fa-hashtag"></i> World-chat
          </a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">
            Direct Messages
            <button type="button" title="New DM" aria-label="New DM">+</button>
          </div>
          <div id="dm-list"></div>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card">
          <div class="avatar"><i class="fa-solid fa-user"></i></div>
          <div class="user-info">
            <div class="user-name">You</div>
            <div class="user-status">Online</div>
          </div>
          <div class="footer-actions">
            <a class="icon-btn" href="../../settings/user-settings/index.html" title="Settings" aria-label="Settings">
              <i class="fa-solid fa-gear"></i>
            </a>
          </div>
        </div>
      </div>
    </aside>

    <!-- Chat -->
    <main class="chat">
      <header class="chat-header">
        <div class="chat-title">
          <i class="fa-solid fa-hashtag"></i>
          World-chat
          <span class="chat-desc">— public room</span>
        </div>
        <div class="header-actions">
          <button class="header-btn" type="button" aria-label="Log out">
            <i class="fa-solid fa-right-from-bracket"></i> Log out
          </button>
        </div>
      </header>
      <div class="messages" id="messages">
        <div class="messages-empty" id="msg-empty">
          <i class="fa-regular fa-comments"></i>
          <span>This is the beginning of #World-chat</span>
        </div>
      </div>
      <div class="composer">
        <form class="composer-bar" id="composer-form">
          <button class="composer-action" type="button" title="Attach file" aria-label="Attach file">
            <i class="fa-solid fa-paperclip"></i>
          </button>
          <input type="text" id="composer-input" placeholder="Message #World-chat" autocomplete="off" aria-label="Message input" />
          <button class="composer-action" type="button" title="GIF" aria-label="Insert GIF">
            <i class="fa-solid fa-film"></i>
          </button>
          <button class="send-btn" type="submit" aria-label="Send message">
            <i class="fa-solid fa-paper-plane"></i> Send
          </button>
        </form>
      </div>
    </main>

    <!-- Members -->
    <aside class="members-panel">
      <div class="members-header">Members &mdash; <span id="online-count">0</span> online</div>
      <div class="members-list" id="members-list">
        <div class="members-section-label">Online</div>
      </div>
    </aside>
  </div>

  <script src="worldchat.js"></script>
</body>
</html>
