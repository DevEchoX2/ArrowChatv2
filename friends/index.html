<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends — ArrowChatv2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <i class="fa-solid fa-arrow-right"></i>
        ArrowChat
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Navigate</div>
          <a class="nav-item active" href="index.html">
            <i class="fa-solid fa-user-group"></i> Friends
          </a>
          <a class="nav-item" href="blocked/index.html">
            <i class="fa-solid fa-ban"></i> Blocked Users
          </a>
          <a class="nav-item" href="../groupchat/privaterooms/private.html">
            <i class="fa-solid fa-lock"></i> Private Rooms
          </a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Public Rooms</div>
          <a class="nav-item" href="../public/public-rooms/worldchat.html">
            <i class="fa-solid fa-hashtag"></i> World-chat
          </a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Direct Messages</div>
          <div id="dm-list"></div>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card">
          <div class="avatar"><i class="fa-solid fa-user"></i></div>
          <div class="user-info">
            <div class="user-name">You</div>
            <div class="user-status">Online</div>
          </div>
          <div class="footer-actions">
            <a class="icon-btn" href="../settings/user-settings/index.html" title="Settings" aria-label="Settings">
              <i class="fa-solid fa-gear"></i>
            </a>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <div class="content" id="friends-content">
      <header class="content-header">
        <h1><i class="fa-solid fa-user-group"></i> Friends</h1>
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="online" type="button">Online</button>
          <button class="tab-btn" data-tab="all" type="button">All Friends</button>
          <button class="tab-btn" data-tab="add" type="button">Add Friend</button>
          <button class="tab-btn" data-tab="blocked" type="button">
            <i class="fa-solid fa-ban" style="font-size:0.7rem;"></i> Blocked
          </button>
        </div>
      </header>

      <!-- Online -->
      <div class="tab-panel active" id="panel-online"></div>

      <!-- All Friends -->
      <div class="tab-panel" id="panel-all"></div>

      <!-- Add Friend -->
      <div class="tab-panel" id="panel-add">
        <div class="add-friend-form">
          <h2>Add Friend</h2>
          <p>Enter a username to send a friend request.</p>
          <form id="add-friend-form">
            <div class="add-input-row">
              <input type="text" id="add-input" placeholder="Enter username..." autocomplete="off" />
              <button type="submit">Send Request</button>
            </div>
            <div class="add-notice" id="add-notice"></div>
          </form>
        </div>
      </div>

      <!-- Blocked -->
      <div class="tab-panel" id="panel-blocked"></div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
