<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocked Users — ArrowChatv2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="blocked.css" />

</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <i class="fa-solid fa-arrow-right"></i>
        ArrowChat
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Navigate</div>
          <a class="nav-item" href="../index.html">
            <i class="fa-solid fa-user-group"></i> Friends
          </a>
          <a class="nav-item active" href="index.html">
            <i class="fa-solid fa-ban"></i> Blocked Users
          </a>
          <a class="nav-item" href="../../groupchat/privaterooms/private.html">
            <i class="fa-solid fa-lock"></i> Private Rooms
          </a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Public Rooms</div>
          <a class="nav-item" href="../../public/public-rooms/worldchat.html">
            <i class="fa-solid fa-hashtag"></i> World-chat
          </a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card">
          <div class="avatar"><i class="fa-solid fa-user"></i></div>
          <div class="user-info">
            <div class="user-name">You</div>
            <div class="user-status">Online</div>
          </div>
          <a class="icon-btn" href="../../settings/user-settings/index.html" title="Settings">
            <i class="fa-solid fa-gear"></i>
          </a>
        </div>
      </div>
    </aside>

    <div class="content">
      <header class="content-header">
        <h1><i class="fa-solid fa-ban"></i> Blocked Users</h1>
      </header>
      <div class="blocked-list" id="blocked-list">
        <div class="panel-title">Blocked — <span id="blocked-count">0</span></div>
        <div id="blocked-items"></div>
      </div>
    </div>
  </div>

    <script src="../../shared/firebase-config.js"></script>
    <script src="../../shared/auth.js"></script>
  <script src="blocked.js"></script>

</body>
</html>
