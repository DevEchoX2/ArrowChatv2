<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocked Users — ArrowChatv2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root {
      --bg: #000; --s1: #0a0a0a; --s2: #111; --s3: #171717;
      --border: #1e1e1e; --border2: #2a2a2a;
      --text: #e8e8e8; --muted: #777; --dim: #444;
      --field: #141414; --hover: #141414; --active: #1c1c1c;
      color-scheme: dark;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; }
    .layout { display: grid; grid-template-columns: 220px 1fr; height: 100vh; overflow: hidden; }
    .sidebar {
      background: var(--s1); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-header {
      padding: 0.8rem 1rem; border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 0.92rem; letter-spacing: 0.03em;
      display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0;
    }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 0.4rem 0; }
    .nav-section { padding: 0.5rem 0.6rem 0.1rem; }
    .nav-section-title {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--dim); margin-bottom: 0.2rem;
    }
    .nav-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.3rem 0.45rem; border-radius: 4px; color: var(--muted);
      font-size: 0.86rem; text-decoration: none; border: none; background: none;
      width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--hover); color: var(--text); }
    .nav-item.active { background: var(--active); color: var(--text); }
    .nav-item i { width: 14px; text-align: center; font-size: 0.78rem; flex-shrink: 0; }
    .sidebar-footer {
      padding: 0.6rem 0.7rem; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .user-card { display: flex; align-items: center; gap: 0.5rem; }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--s3); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; color: var(--muted); flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-status { font-size: 0.68rem; color: var(--muted); }
    .icon-btn {
      background: none; border: none; color: var(--muted);
      padding: 0.25rem; border-radius: 4px; font-size: 0.8rem; line-height: 1;
    }
    .icon-btn:hover { background: var(--active); color: var(--text); }
    .content { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
    .content-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 1rem; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .content-header h1 { font-size: 0.95rem; font-weight: 700; display: flex; align-items: center; gap: 0.45rem; }
    .content-header h1 i { color: var(--muted); font-size: 0.85rem; }
    .blocked-list { flex: 1; overflow-y: auto; padding: 1rem; }
    .blocked-list::-webkit-scrollbar { width: 4px; }
    .blocked-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .panel-title {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--dim); margin-bottom: 0.5rem;
      padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
    }
    .user-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.5rem 0.6rem; border-radius: 6px;
      border-bottom: 1px solid var(--border);
    }
    .user-item:hover { background: var(--hover); }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--s3); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; color: var(--muted); flex-shrink: 0;
    }
    .user-info-col { flex: 1; min-width: 0; }
    .user-display-name { font-size: 0.88rem; font-weight: 600; }
    .user-sub { font-size: 0.74rem; color: var(--muted); }
    .user-actions { display: flex; gap: 0.3rem; }
    .action-btn {
      background: var(--s2); border: 1px solid var(--border2);
      color: var(--muted); padding: 0.25rem 0.5rem; border-radius: 4px;
      font-size: 0.75rem; display: inline-flex; align-items: center; gap: 0.25rem;
    }
    .action-btn:hover { background: var(--active); color: var(--text); }
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 3rem 1rem; color: var(--dim);
      gap: 0.5rem; text-align: center; font-size: 0.84rem;
    }
    .empty-state i { font-size: 2rem; color: var(--border2); margin-bottom: 0.3rem; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <i class="fa-solid fa-arrow-right"></i>
        ArrowChat
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Navigate</div>
          <a class="nav-item" href="../index.html">
            <i class="fa-solid fa-user-group"></i> Friends
          </a>
          <a class="nav-item active" href="index.html">
            <i class="fa-solid fa-ban"></i> Blocked Users
          </a>
          <a class="nav-item" href="../../groupchat/privaterooms/private.html">
            <i class="fa-solid fa-lock"></i> Private Rooms
          </a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Public Rooms</div>
          <a class="nav-item" href="../../public/public-rooms/worldchat.html">
            <i class="fa-solid fa-hashtag"></i> World-chat
          </a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card">
          <div class="avatar"><i class="fa-solid fa-user"></i></div>
          <div class="user-info">
            <div class="user-name">You</div>
            <div class="user-status">Online</div>
          </div>
          <a class="icon-btn" href="../../settings/user-settings/index.html" title="Settings">
            <i class="fa-solid fa-gear"></i>
          </a>
        </div>
      </div>
    </aside>

    <div class="content">
      <header class="content-header">
        <h1><i class="fa-solid fa-ban"></i> Blocked Users</h1>
      </header>
      <div class="blocked-list" id="blocked-list">
        <div class="panel-title">Blocked — <span id="blocked-count">0</span></div>
        <div id="blocked-items"></div>
      </div>
    </div>
  </div>

  <script>
    const BLOCKED_KEY = 'arrowchat_blocked';
    function load() {
      try { return JSON.parse(localStorage.getItem(BLOCKED_KEY)) || []; } catch { return []; }
    }
    function save(list) { localStorage.setItem(BLOCKED_KEY, JSON.stringify(list)); }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function render() {
      const blocked = load();
      document.getElementById('blocked-count').textContent = blocked.length;
      const container = document.getElementById('blocked-items');
      if (!blocked.length) {
        container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-ban"></i><span>No blocked users.</span></div>`;
        return;
      }
      container.innerHTML = blocked.map(u => `
        <div class="user-item">
          <div class="user-avatar">${esc(u.name.slice(0,2).toUpperCase())}</div>
          <div class="user-info-col">
            <div class="user-display-name">${esc(u.name)}</div>
            <div class="user-sub">Blocked</div>
          </div>
          <div class="user-actions">
            <button class="action-btn" data-name="${esc(u.name)}" data-action="unblock">
              <i class="fa-solid fa-user-check"></i> Unblock
            </button>
          </div>
        </div>`).join('');
    }
    document.getElementById('blocked-list').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action="unblock"]');
      if (!btn) return;
      const name = btn.dataset.name;
      save(load().filter(u => u.name !== name));
      render();
    });
    render();
  </script>
</body>
</html>
